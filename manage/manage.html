<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabStash — 管理所有 Sessions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="manage.css">
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="../icons/icon48.png" alt="TabStash" class="sidebar-icon">
        <h1 class="sidebar-title">TabStash</h1>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-filter="all" id="nav-all">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
          </svg>
          <span>所有 Sessions</span>
          <span class="nav-badge" id="nav-all-count">0</span>
        </button>
        <button class="nav-item" data-filter="today" id="nav-today">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <span>今天</span>
          <span class="nav-badge" id="nav-today-count">0</span>
        </button>
        <button class="nav-item" data-filter="yesterday" id="nav-yesterday">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
          </svg>
          <span>昨天</span>
          <span class="nav-badge" id="nav-yesterday-count">0</span>
        </button>
        <button class="nav-item" data-filter="week" id="nav-week">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span>本週</span>
          <span class="nav-badge" id="nav-week-count">0</span>
        </button>
        <button class="nav-item" data-filter="older" id="nav-older">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          </svg>
          <span>更早</span>
          <span class="nav-badge" id="nav-older-count">0</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-stats">
          <div class="stat-item">
            <span class="stat-value" id="total-sessions">0</span>
            <span class="stat-label">Sessions</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="total-tabs">0</span>
            <span class="stat-label">分頁</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">
      <!-- Top Bar -->
      <div class="topbar" id="topbar">
        <div class="search-bar" id="search-bar">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" class="search-input" id="search-input" placeholder="搜尋 session 名稱、分頁標題或 URL...">
          <button class="search-clear hidden" id="search-clear" title="清除搜尋">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>

        <div class="topbar-actions">
          <button class="topbar-btn" id="btn-export" title="匯出資料">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span>匯出</span>
          </button>
          <button class="topbar-btn" id="btn-import" title="匯入資料">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span>匯入</span>
          </button>
          <input type="file" id="import-file" accept=".json" class="hidden">
        </div>
      </div>

      <!-- Content Area -->
      <div class="content" id="content">
        <div class="content-header" id="content-header">
          <h2 class="content-title" id="content-title">所有 Sessions</h2>
          <span class="content-count" id="content-count">0 個 sessions</span>
        </div>

        <div class="sessions-grid" id="sessions-grid">
          <!-- Sessions rendered here -->
        </div>

        <div class="empty-state hidden" id="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
          <p class="empty-title" id="empty-title">還沒有收集任何分頁</p>
          <p class="empty-hint">透過瀏覽器工具列的 TabStash 圖示開始收集</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast hidden" id="toast">
    <span id="toast-message"></span>
  </div>

  <!-- Confirm Dialog Overlay (inserted by JS) -->

  <script src="manage.js"></script>
</body>
</html>
